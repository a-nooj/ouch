<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ouch — Robot Base Placement</title>

    <!-- Organic typography: Fraunces (display) + Nunito (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!--
      Critical layout styles as inline CSS — these must work even before
      Tailwind/PostCSS has processed index.css. They establish the full-
      viewport canvas and hide the document scrollbar.
    -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: 'Nunito', system-ui, sans-serif; background: #FDFCF8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
